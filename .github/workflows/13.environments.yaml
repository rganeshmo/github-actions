name: 13 - Environments
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: Choose which environment to deloy
        type: choice
        options:
          - dev
          - test
    
jobs:
    build-dev:
        runs-on: self-hosted
        if: ${{ github.event.inputs.environment == 'dev' }}
        environment: dev        
        steps:
            - name: Build on Dev
              run: echo "${{ vars.DEPLOYMENTNAME }}"
        
    build-test:
        runs-on: self-hosted
        if: ${{ github.event.inputs.environment == 'test' }}
        environment: test
        steps:
          - name: Build on Test
            run: echo "${{ vars.DEPLOYMENTNAME }}"
              