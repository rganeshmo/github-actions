name: 13 - Environments
on: 
  workflow_dispatch:
    inputs:
      environment:
        description: Choose which environment to deloy
        type: choice
        options:
          - dev
          - test
    
jobs:
    build:
        runs-on: self-hosted
        env:
          Environment: ${{ github.event.inputs.environment }}    
        steps:
            - name: Displaying Variable Name
              run: |
                echo "Running in $Environment"
                echo "${{ vars.DEPLOYMENTNAME}}"
        
    deploy:
        runs-on: self-hosted
        env:
          Environment: ${{ github.event.inputs.environment }}            
        steps:
          - name: Displaying Test Variable Name
            run: |
              echo "Running in $Environment"
              echo "${{ vars.DEPLOYMENTNAME}}"