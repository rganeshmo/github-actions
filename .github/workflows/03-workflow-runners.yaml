name: 03 - Workflow Runners
on: workflow_dispatch
jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show OS
              run: |
                "This job is running on an Ubuntu runner."
                "Runner OS is $RUNNER_OS"

    windows-echo:
        runs-on: windows-latest
        steps:
            - name: Show OS
              run: |
                "This job is running on a Windows runner."
                "Runner OS is $RUNNER_OS"

    mac-echo:
        runs-on: macos-latest
        steps:
            - name: Show OS
              run: |
                "This job is running on a MacOS runner."
                "Runner OS is $RUNNER_OS"
