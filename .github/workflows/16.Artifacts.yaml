name: 16 - Artifact Workflow
on: workflow_dispatch
jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Directory & file
        run: |
            mkdir build                 
            echo "Artifact Data" > build/result.txt
            cat build/result.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: build/result.txt

  deploy-job:
    runs-on: ubuntu-latest
    needs: build-job
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: deploy
      - name: Verify
        run: cat deploy/result.txt
