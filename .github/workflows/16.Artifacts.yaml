name: 16 - Artifact Workflow
on: workflow_dispatch
jobs:
  build-job:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create file
        run: |
            mkdir build 
            cd build
            echo "Artifact Data" > result.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-artifact
          path: result.txt
  deploy-job:
    runs-on: ubuntu-latest
    needs: build-job
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: my-artifact
      - name: Verify
        run: |
            ls -l
            cat result.txt
